<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>泠 | 个人主页</title>
    <meta name="description" content="个人主页与博客" />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header class="masthead">
      <img class="masthead__img" src="./assets/img/hero.jpg" alt="" />
      <div class="masthead__overlay"></div>
      <div class="container masthead__nav">
        <a class="brand" href="./index.html">泠</a>
        <nav class="nav">
          <a class="nav__link nav__link--active" href="./index.html">Home</a>
          <a class="nav__link" href="./about.html">About</a>
          <a class="nav__link" href="./archive.html">Archive</a>
          <a class="nav__link" href="./video.html">Video</a>
        </nav>
      </div>
      <div class="container masthead__inner">
        <div>
          <h1 class="masthead__title">泠</h1>
          <p class="masthead__subtitle">「愿戴荣光，坠入天渊」</p>
        </div>
      </div>
    </header>

    <main class="container layout">
      <section class="hero card">
        <div class="hero__row">
          <img class="avatar" src="./assets/img/aimisi.jpg" alt="泠的头像" />
          <div>
            <h1 class="hero__title">泠</h1>
            <p class="hero__quote">愿戴荣光，坠入天渊</p>
            <p class="hero__desc">
              我在这里，记录生活与思考。关于我，在 <a href="./about.html">About</a> 
            </p>
          </div>
        </div>
      </section>

      <section class="content">
        <div class="section-title">
          <h2>Latest Posts</h2>
        </div>
        <div id="postList" class="post-list"></div>

        <div class="section-title">
          <h2>Gallery</h2>
        </div>
        <section class="gallery">
          <figure class="gallery__item">
            <img class="gallery__img" src="./assets/img/gallery/lsl.jpg" alt="展示图 lsl" />
          </figure>
          <figure class="gallery__item">
            <img class="gallery__img" src="./assets/img/gallery/yn.jpg" alt="展示图 yn" />
          </figure>
          <figure class="gallery__item">
            <img class="gallery__img" src="./assets/img/gallery/fll.jpg" alt="展示图 fll" />
          </figure>
        </section>
      </section>

      <aside class="sidebar">
        <div class="card">
          <div class="card__title">Featured Tags</div>
          <div id="tagList" class="tags"></div>
        </div>

        <div class="card">
          <div class="card__title">留言板</div>
          <form id="guestbookForm" class="guestbook-form">
            <input
              type="text"
              id="guestName"
              class="input guestbook-input"
              placeholder="你的ID"
              maxlength="30"
              required
            />
            <textarea
              id="guestMessage"
              class="input guestbook-textarea"
              placeholder="说点什么吧..."
              maxlength="200"
              required
            ></textarea>
            <button type="submit" class="guestbook-btn">留言</button>
          </form>
          <div id="guestbookList" class="guestbook-list"></div>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <span>Copyright © <span id="year"></span> 泠</span>
        <span class="muted">Built with plain HTML/CSS/JS</span>
      </div>
    </footer>

    <!-- 底部音乐播放条 -->
    <div class="music-bar">
      <div class="music-bar__inner">
        <div class="music-bar__info">
          <span class="music-bar__title">愿戴荣光坠入天渊</span>
          <span class="music-bar__artist">鸣潮</span>
        </div>
        <div class="music-bar__player">
          <iframe src="player.html" style="border:none;width:160px;height:36px;border-radius:18px;" allow="autoplay"></iframe>
        </div>
      </div>
    </div>

    <script src="./assets/site.js"></script>
    <script>
      window.Site.renderHome();
    </script>
  </body>
</html>
