<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video | 泠</title>
    <meta name="description" content="视频作品展示" />
    <link rel="stylesheet" href="./assets/style.css" />
    <style>
      .video-page {
        padding: 24px 0 40px;
      }

      .video-page__header {
        margin-bottom: 22px;
      }

      .video-page__header h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      .video-page__header p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .video-card {
        border-radius: 16px;
        overflow: hidden;
        background: var(--card);
        border: 1px solid var(--bd1);
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .video-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 24px 64px rgba(16, 24, 40, 0.18);
      }

      .video-thumb {
        position: relative;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: #1a2a3a;
      }

      .video-thumb__img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: filter 0.2s;
      }

      .video-card:hover .video-thumb__img {
        filter: brightness(0.75);
      }

      .video-thumb__play {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.85;
        transition: opacity 0.2s;
      }

      .video-card:hover .video-thumb__play {
        opacity: 1;
      }

      .video-thumb__play-icon {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .video-thumb__play-icon::after {
        content: "";
        display: block;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 10px 0 10px 17px;
        border-color: transparent transparent transparent #1a2a3a;
        margin-left: 4px;
      }

      .video-thumb__duration {
        position: absolute;
        bottom: 8px;
        right: 10px;
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 6px;
      }

      .video-info {
        padding: 12px 14px 14px;
      }

      .video-info__title {
        margin: 0 0 5px;
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.5;
      }

      .video-info__meta {
        font-size: 12px;
        color: var(--muted);
        margin: 0;
      }

      /* Player Modal */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.88);
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal.is-open {
        display: flex;
      }

      .modal__box {
        position: relative;
        width: 100%;
        max-width: 960px;
        background: #000;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
      }

      .modal__close {
        position: absolute;
        top: -42px;
        right: 0;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #fff;
        font-size: 22px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }

      .modal__close:hover {
        background: rgba(255, 255, 255, 0.28);
      }

      .modal__player {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        border: none;
      }

      .modal__title {
        padding: 12px 16px;
        color: rgba(255, 255, 255, 0.85);
        font-size: 15px;
        font-weight: 600;
        background: #111;
      }

      @media (max-width: 540px) {
        .video-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 380px) {
        .video-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <img class="masthead__img" src="./assets/img/hero.jpg" alt="" />
      <div class="masthead__overlay"></div>
      <div class="container masthead__nav">
        <a class="brand" href="./index.html">泠</a>
        <nav class="nav">
          <a class="nav__link" href="./index.html">Home</a>
          <a class="nav__link" href="./about.html">About</a>
          <a class="nav__link" href="./archive.html">Archive</a>
          <a class="nav__link nav__link--active" href="./video.html">Video</a>
        </nav>
      </div>
      <div class="container masthead__inner">
        <div>
          <h1 class="masthead__title">Video</h1>
          <p class="masthead__subtitle">视频作品</p>
        </div>
      </div>
    </header>

    <main class="container video-page">
      <div class="video-page__header">
        <h1>视频作品</h1>
        <p>点击封面卡片即可播放</p>
      </div>
      <div id="videoList" class="video-grid"></div>
    </main>

    <!-- Player Modal -->
    <div id="playerModal" class="modal">
      <div class="modal__box">
        <button class="modal__close" id="modalClose" aria-label="关闭">&#x2715;</button>
        <div id="modalPlayerWrap"></div>
        <div class="modal__title" id="modalTitle"></div>
      </div>
    </div>

    <footer class="footer">
      <div class="container footer__inner">
        <span>Copyright © <span id="year"></span> 泠</span>
        <span class="muted">Built with plain HTML/CSS/JS</span>
      </div>
    </footer>

    <script src="./assets/site.js"></script>
    <script>
      window.Site.renderVideo();
    </script>
  </body>
</html>
