<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>播放器</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    audio { display: none; }
    .btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #5b8def, #7ba3ff);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(91, 141, 239, 0.4);
    }
    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 16px rgba(91, 141, 239, 0.5);
    }
    .volume {
      width: 70px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
    }
    .volume::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #7ba3ff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <audio id="bgm" src="./assets/music/愿戴荣光坠入天渊.mp3" loop></audio>
  <button class="btn" onclick="toggle()">▶</button>
  <input type="range" class="volume" min="0" max="1" step="0.1" value="0.5" onchange="setVol(this.value)">
  
  <script>
    const bgm = document.getElementById('bgm');
    const btn = document.querySelector('.btn');
    bgm.volume = 0.5;
    
    // 尝试自动播放
    bgm.play().catch(() => {});
    
    function toggle() {
      if (bgm.paused) {
        bgm.play();
        btn.textContent = '⏸';
      } else {
        bgm.pause();
        btn.textContent = '▶';
      }
    }
    
    function setVol(v) {
      bgm.volume = v;
    }
    
    // 监听状态变化
    bgm.addEventListener('play', () => btn.textContent = '⏸');
    bgm.addEventListener('pause', () => btn.textContent = '▶');
  </script>
</body>
</html>
